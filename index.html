<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        nav {
            background-color: #222;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        nav .logo {
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }

        nav ul li a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.95rem;
        }

        nav ul li a:hover {
            color: #fff;
        }

        .hero {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
            text-align: center;
        }

        h1 {
            color: red;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">My Website</span>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>Hello World</h1>
        <p>Welcome to my website</p>
    </div>

</body>
</html>
